name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────
  # JOB 1: Continuous Integration
  # Runs on every push and pull_request to main
  # ───────────────────────────────────────────────
  ci:
    name: 🔍 Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔎 Check App Entry Point Exists
        run: |
          if [ ! -f "app.js" ]; then
            echo "❌ app.js not found!"
            exit 1
          fi
          echo "✅ app.js found"

      - name: 🔎 Validate package.json
        run: node -e "require('./package.json'); console.log('✅ package.json is valid')"

      - name: 🧪 Run Tests
        run: npm test || echo "⚠️  No tests configured yet — skipping"

  # ───────────────────────────────────────────────
  # JOB 2: Continuous Deployment
  # Only runs after CI passes AND only on push to main (not PRs)
  # ───────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 400 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            echo "📂 Navigating to app directory..."
            cd ${{ secrets.EC2_APP_DIR }}

            echo "⬇️  Pulling latest code from GitHub..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --omit=dev

            echo "♻️  Reloading app with PM2 (zero downtime)..."
            pm2 reload eCommerce --update-env

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo ""
            echo "✅ Deployment complete!"
            pm2 status eCommerce
          ENDSSH

      - name: 📢 Notify Deployment Success
        if: success()
        run: echo "🎉 Successfully deployed eCommerce to AWS EC2!"

      - name: ❌ Notify Deployment Failure
        if: failure()
        run: echo "💥 Deployment failed! Check the logs above."
